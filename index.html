<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩვენ აქ ვართ</title>
    <style>
        :root {
            --blue: #1a73e8;
            --orange: #f29900;
            --bg: #f8f9fa;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            margin: 0;
            padding-bottom: 50px;
        }

        header {
            background: #fff;
            padding: 20px;
            text-align: center;
            border-bottom: 3px solid var(--blue);
        }

        .logo {
            width: 90px;
            height: 90px;
            border-radius: 50%;
            border: 2px solid var(--blue);
            object-fit: cover;
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 20px;
        }

        .calc-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            background: linear-gradient(90deg, #1e3c72, #2a5298);
            color: white;
            padding: 15px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .reg-card {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.1);
            margin-bottom: 40px;
            border-top: 6px solid var(--orange);
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .full-row {
            grid-column: span 2;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .btn-submit {
            width: 100%;
            background: var(--orange);
            color: white;
            border: none;
            padding: 18px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.08);
            border-bottom: 5px solid var(--blue);
            position: relative;
        }

        .call-btn {
            display: block;
            text-align: center;
            background: #28a745;
            color: white;
            padding: 10px;
            border-radius: 5px;
            text-decoration: none;
            margin-top: 10px;
            font-weight: bold;
        }

        .admin-input {
            width: 60px;
            opacity: 0.1;
            position: absolute;
            top: 10px;
            right: 10px;
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .full-row {
                grid-column: span 1;
            }
        }
    </style>
</head>

<body>
    <header>
        <img src="New DOC Document.jpg" alt="Logo" class="logo">
        <h1>ჩვენ აქ ვართ</h1>
        <input type="password" class="admin-input" placeholder="Pass" oninput="showAdmin(this.value)">
    </header>

    <div class="container">
        <a href="https://kanudosi4-sys.github.io/alika/" target="_blank" class="calc-link">🧮 სამშენებლო კალკულატორი</a>

        <div class="reg-card">
            <h3>📝 განცხადების დამატება</h3>
            <form id="regForm">
                <div class="form-grid">
                    <input type="text" id="name" placeholder="სახელი / კომპანია" required class="full-row">
                    <select id="city">
                        <option value="თბილისი">თბილისი</option>
                        <option value="ბათუმი">ბათუმი</option>
                        <option value="ქუთაისი">ქუთაისი</option>
                        <option value="რუსთავი">რუსთავი</option>
                        <option value="გორი">გორი</option>
                        <option value="თელავი">თელავი</option>
                        <option value="ზუგდიდი">ზუგდიდი</option>
                        <option value="ფოთი">ფოთი</option>
                    </select>
                    <select id="cat">
                        <option value="მშენებლობა / რემონტი">მშენებლობა / რემონტი</option>
                        <option value="კვება / რესტორანი">კვება / რესტორანი</option>
                        <option value="ხელოვნება / გართობა">ხელოვნება / გართობა</option>
                        <option value="ტურიზმი / სასტუმრო">ტურიზმი / სასტუმრო</option>
                        <option value="IT / პროგრამირება">IT / პროგრამირება</option>
                        <option value="სხვა">სხვა პროფესია</option>
                    </select>
                    <input type="text" id="salary" placeholder="💰 ანაზღაურება" class="full-row">
                    <textarea id="desc" placeholder="აღწერეთ პირობები..." rows="3" class="full-row"></textarea>
                    <input type="tel" id="phone" placeholder="ტელეფონის ნომერი" required class="full-row">
                    <button type="submit" class="btn-submit" id="submitBtn">გამოქვეყნება</button>
                </div>
            </form>
        </div>
        <div id="displayBox" class="grid"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBfOfz9TAw8TWfVL8qNrhdHbwbc2TewMNw",
            authDomain: "chven-aq-vart.firebaseapp.com",
            databaseURL: "https://chven-aq-vart-default-rtdb.firebaseio.com",
            projectId: "chven-aq-vart",
            storageBucket: "chven-aq-vart.firebasestorage.app",
            messagingSenderId: "1067834621567",
            appId: "1:1067834621567:web:46682b816c3bce4defc94a",
            measurementId: "G-370R8XGGC4"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ადმინის ფუნქცია
        window.showAdmin = (v) => {
            document.querySelectorAll('.del-btn').forEach(b => b.style.display = (v === '1234') ? 'block' : 'none');
        };

        // წაშლის ფუნქცია
        window.deletePost = async (id) => {
            if (confirm("წავშალოთ?")) await deleteDoc(doc(db, "ads", id));
        };

        // ჩვენება
        const q = query(collection(db, "ads"), orderBy("timestamp", "desc"));
        onSnapshot(q, (snapshot) => {
            const displayBox = document.getElementById('displayBox');
            displayBox.innerHTML = '';
            snapshot.forEach((snap) => {
                const ad = snap.data();
                displayBox.innerHTML += `
                    <div class="card">
                        <button class="del-btn" style="display:none; background:red; color:white; border:none; position:absolute; top:5px; right:5px; cursor:pointer;" onclick="deletePost('${snap.id}')">X</button>
                        <h3>${ad.name}</h3>
                        <p>📍 ${ad.city} | 📂 ${ad.cat}</p>
                        <p>💰 ${ad.salary}</p>
                        <p>${ad.description}</p>
                        <a href="tel:${ad.phone}" class="call-btn">📞 დარეკვა: ${ad.phone}</a>
                    </div>`;
            });
        });

        // გაგზავნა
        document.getElementById('regForm').onsubmit = async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true; btn.innerText = "იგზავნება...";
            try {
                await addDoc(collection(db, "ads"), {
                    name: document.getElementById('name').value,
                    city: document.getElementById('city').value,
                    cat: document.getElementById('cat').value,
                    salary: document.getElementById('salary').value,
                    description: document.getElementById('desc').value,
                    phone: document.getElementById('phone').value,
                    timestamp: new Date()
                });
                alert("წარმატებით აიტვირთა!");
                e.target.reset();
            } catch (err) { alert("შეცდომაა!"); }
            finally { btn.disabled = false; btn.innerText = "გამოქვეყნება"; }
        };
    </script>
</body>

</html>
