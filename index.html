<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩვენ აქ ვართ - ოსტატების ბაზა</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --light: #f4f7f6;
            --success: #27ae60;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--light);
            margin: 0;
            padding: 20px;
        }

        .header {
            text-align: center;
            padding: 40px 20px;
            background: var(--primary);
            color: white;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin-bottom: 15px;
            object-fit: cover;
        }

        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            max-width: 1000px;
            margin-left: auto;
            margin-right: auto;
        }

        .filter-btn {
            padding: 8px 16px;
            border: none;
            background: white;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-weight: bold;
            font-size: 0.9em;
        }

        .filter-btn:hover,
        .filter-btn.active {
            background: var(--accent);
            color: white;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
            text-align: left;
            border-top: 6px solid var(--accent);
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .badge {
            background: #e8f0fe;
            color: #1a73e8;
            padding: 4px 12px;
            border-radius: 15px;
            font-size: 0.85em;
            font-weight: bold;
            margin-right: 5px;
            display: inline-block;
            margin-top: 5px;
        }

        .rating {
            color: #f1c40f;
            font-size: 1.2em;
            margin: 10px 0;
        }

        .contact-btn {
            display: block;
            margin-top: 15px;
            padding: 12px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            text-align: center;
            transition: 0.3s;
        }

        .contact-btn:hover {
            background: var(--success);
            transform: scale(1.02);
        }

        .add-profile {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            max-width: 550px;
            margin: 40px auto;
            border: 2px solid #ddd;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 1em;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1.1em;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="New DOC Document.jpg" alt="Logo" class="logo">
        <h1>ჩვენ აქ ვართ</h1>
        <p>ოსტატებისა და სერვისების ერთიანი ბაზა</p>
    </div>

    <div class="filters">
        <button class="filter-btn active" onclick="filterCards('ყველა', this)">ყველა</button>
        <button class="filter-btn" onclick="filterCards('თბილისი', this)">თბილისი</button>
        <button class="filter-btn" onclick="filterCards('ბათუმი', this)">ბათუმი</button>
        <button class="filter-btn" onclick="filterCards('ქუთაისი', this)">ქუთაისი</button>
        <button class="filter-btn" onclick="filterCards('რუსთავი', this)">რუსთავი</button>
        <button class="filter-btn" onclick="filterCards('ზუგდიდი', this)">ზუგდიდი</button>
        <button class="filter-btn" onclick="filterCards('ფოთი', this)">ფოთი</button>
        <button class="filter-btn" onclick="filterCards('გორი', this)">გორი</button>
    </div>

    <div class="grid" id="profileGrid"></div>

    <div class="add-profile">
        <h2 style="text-align: center; color: var(--primary);">რეგისტრაცია</h2>
        <form id="regForm">
            <input type="text" id="userName" placeholder="სახელი და გვარი" required>

            <select id="userCity" required>
                <option value="" disabled selected>აირჩიე ქალაქი/რეგიონი</option>
                <option value="თბილისი">თბილისი</option>
                <option value="ბათუმი">ბათუმი</option>
                <option value="ქუთაისი">ქუთაისი</option>
                <option value="რუსთავი">რუსთავი</option>
                <option value="გორი">გორი</option>
                <option value="ზუგდიდი">ზუგდიდი</option>
                <option value="ფოთი">ფოთი</option>
                <option value="თელავი">თელავი</option>
                <option value="მცხეთა">მცხეთა</option>
                <option value="ახალციხე">ახალციხე</option>
                <option value="ამბროლაური">ამბროლაური</option>
                <option value="ოზურგეთი">ოზურგეთი</option>
                <option value="ხაშური">ხაშური</option>
                <option value="სამტრედია">სამტრედია</option>
                <option value="სენაკი">სენაკი</option>
                <option value="ზესტაფონი">ზესტაფონი</option>
                <option value="მარნეული">მარნეული</option>
            </select>

            <select id="userCategory" required>
                <option value="" disabled selected>საქმიანობის სფერო</option>
                <option value="მშენებელი">მშენებელი</option>
                <option value="ხელოსანი">ხელოსანი</option>
                <option value="სპეც-ტექნიკა">სპეც-ტექნიკა</option>
                <option value="მძღოლი">მძღოლი</option>
                <option value="სხვა">სხვა სერვისი</option>
            </select>

            <div style="display:flex; gap:10px;">
                <input type="number" id="userExp" placeholder="გამოცდილება (წელი)">
                <select id="userRating">
                    <option value="⭐⭐⭐⭐⭐">5 ვარსკვლავი</option>
                    <option value="⭐⭐⭐⭐">4 ვარსკვლავი</option>
                    <option value="⭐⭐⭐">3 ვარსკვლავი</option>
                </select>
            </div>

            <input type="tel" id="userPhone" placeholder="ტელეფონი (მაგ: 599...)" required>
            <textarea id="userInfo" rows="3" placeholder="დამატებითი ინფორმაცია..."></textarea>

            <button type="submit" class="submit-btn">ბაზაში დამატება</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getDatabase, ref, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBFOfz9TAw8TWfVL8qNrhdHbwbc2TewMNw",
            authDomain: "chven-aq-vart.firebaseapp.com",
            databaseURL: "https://chven-aq-vart-default-rtdb.firebaseio.com",
            projectId: "chven-aq-vart",
            storageBucket: "chven-aq-vart.firebasestorage.app",
            messagingSenderId: "1067834621567",
            appId: "1:1067834621567:web:46682b816c3bce4defc94a"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const profilesRef = ref(db, 'profiles');

        onValue(profilesRef, (snapshot) => {
            const grid = document.getElementById('profileGrid');
            grid.innerHTML = "";
            const data = snapshot.val();
            if (data) {
                Object.values(data).reverse().forEach(p => {
                    const card = document.createElement('div');
                    card.className = 'card';
                    card.innerHTML = `
          <h3>${p.name}</h3>
          <div class="rating">${p.rating || '⭐⭐⭐⭐⭐'}</div>
          <div><span class="badge">📍 ${p.city}</span> <span class="badge">🛠️ ${p.category}</span></div>
          <p><strong>გამოცდილება:</strong> ${p.exp} წელი</p>
          <p style="color: #555;">${p.info}</p>
          <a href="tel:${p.phone}" class="contact-btn">📞 დაკავშირება</a>
        `;
                    grid.appendChild(card);
                });
            }
        });

        document.getElementById('regForm').onsubmit = function (e) {
            e.preventDefault();
            const newProfile = {
                name: document.getElementById('userName').value,
                city: document.getElementById('userCity').value,
                category: document.getElementById('userCategory').value,
                exp: document.getElementById('userExp').value,
                rating: document.getElementById('userRating').value,
                phone: document.getElementById('userPhone').value,
                info: document.getElementById('userInfo').value
            };
            push(profilesRef, newProfile);
            this.reset();
        };

        window.filterCards = function (term, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');

            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const text = card.innerText;
                card.style.display = (term === 'ყველა' || text.includes(term)) ? 'block' : 'none';
            });
        };
    </script>

</body>

</html>
