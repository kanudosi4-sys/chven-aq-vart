<!DOCTYPE html>
<html lang="ka">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ჩვენ აქ ვართ - ოსტატების ბაზა</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --light: #f4f7f6;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--light);
            margin: 0;
            padding: 20px;
        }

        /* ჰედერი და ლოგო */
        .header {
            text-align: center;
            padding: 40px 20px;
            background: var(--primary);
            color: white;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            margin-bottom: 15px;
            object-fit: cover;
        }

        /* ფილტრები */
        .filters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 10px 20px;
            border: none;
            background: white;
            border-radius: 25px;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            font-weight: bold;
        }

        .filter-btn:hover {
            background: var(--accent);
            color: white;
        }

        /* ბარათების ბადე */
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            text-align: center;
            position: relative;
            border-top: 5px solid var(--accent);
        }

        .profile-img {
            width: 70px;
            height: 70px;
            background: #eee;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
        }

        .contact-btn {
            display: block;
            margin-top: 15px;
            padding: 10px;
            background: var(--primary);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }

        .delete-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            color: #e74c3c;
            cursor: pointer;
            border: none;
            background: none;
            font-size: 18px;
            font-weight: bold;
        }

        /* ფორმა */
        .add-profile {
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            max-width: 500px;
            margin: 40px auto;
            border: 2px dashed var(--accent);
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-sizing: border-box;
        }

        .submit-btn {
            width: 100%;
            padding: 15px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 16px;
        }
    </style>
</head>

<body>

    <div class="header">
        <img src="New DOC Document.jpg" alt="Logo" class="logo">
        <h1>ჩვენ აქ ვართ</h1>
        <p>ოსტატებისა და სერვისების მონაცემთა ბაზა</p>
    </div>

    <div class="filters">
        <button class="filter-btn" onclick="filterProfiles('ყველა')">ყველა</button>
        <button class="filter-btn" onclick="filterProfiles('მშენებელი')">მშენებელი</button>
        <button class="filter-btn" onclick="filterProfiles('ხელოსანი')">ხელოსანი</button>
        <button class="filter-btn" onclick="filterProfiles('სპეც-ტექნიკა')">სპეც-ტექნიკა</button>
        <button class="filter-btn" onclick="filterProfiles('მძღოლი')">მძღოლი</button>
    </div>

    <div class="grid" id="profileGrid">
    </div>

    <div class="add-profile">
        <h2 style="text-align: center; color: var(--accent);">დაამატე შენი პროფილი</h2>
        <form id="regForm">
            <input type="text" id="userName" placeholder="სახელი და გვარი" required>
            <select id="userCategory">
                <option value="მშენებელი">მშენებელი</option>
                <option value="ხელოსანი">ხელოსანი</option>
                <option value="სპეც-ტექნიკა">სპეც-ტექნიკა</option>
                <option value="მძღოლი">მძღოლი</option>
            </select>
            <input type="number" id="userExp" placeholder="გამოცდილება (წლები)">
            <input type="tel" id="userPhone" placeholder="ტელეფონის ნომერი" required>
            <textarea id="userInfo" placeholder="მოკლე ინფორმაცია თქვენს შესახებ..."></textarea>
            <button type="submit" class="submit-btn">ბაზაში დამატება</button>
        </form>
    </div>

    <script>
        // 1. მონაცემების წამოღება მეხსიერებიდან ჩატვირთვისას
        window.onload = function () {
            const savedProfiles = JSON.parse(localStorage.getItem('myProfiles')) || [];
            savedProfiles.forEach((profile, index) => displayCard(profile, index));
        };

        // 2. ფორმის დამუშავება
        document.getElementById('regForm').onsubmit = function (e) {
            e.preventDefault();

            const newProfile = {
                name: document.getElementById('userName').value,
                category: document.getElementById('userCategory').value,
                exp: document.getElementById('userExp').value,
                phone: document.getElementById('userPhone').value,
                info: document.getElementById('userInfo').value
            };

            const profiles = JSON.parse(localStorage.getItem('myProfiles')) || [];
            profiles.push(newProfile);
            localStorage.setItem('myProfiles', JSON.stringify(profiles));

            displayCard(newProfile, profiles.length - 1);
            this.reset();
        };

        // 3. ბარათის გამოჩენა ეკრანზე
        function displayCard(p, index) {
            const grid = document.getElementById('profileGrid');
            const card = document.createElement('div');
            card.className = 'card';
            card.innerHTML = `
            <button class="delete-btn" onclick="deleteProfile(${index})">×</button>
            <div class="profile-img">👤</div>
            <h3>${p.name}</h3>
            <p><strong>კატეგორია:</strong> ${p.category}</p>
            <p><strong>გამოცდილება:</strong> ${p.exp} წელი</p>
            <p style="font-size: 0.9em; color: #555;">${p.info}</p>
            <a href="tel:${p.phone}" class="contact-btn">დაკავშირება</a>
        `;
            grid.appendChild(card);
        }

        // 4. წაშლის ფუნქცია
        function deleteProfile(index) {
            if (confirm('დარწმუნებული ხართ, რომ გსურთ წაშლა?')) {
                let profiles = JSON.parse(localStorage.getItem('myProfiles'));
                profiles.splice(index, 1);
                localStorage.setItem('myProfiles', JSON.stringify(profiles));
                location.reload();
            }
        }

        // 5. ფილტრაციის ფუნქცია
        function filterProfiles(category) {
            const cards = document.querySelectorAll('.card');
            cards.forEach(card => {
                const cardCategory = card.innerText;
                if (category === 'ყველა' || cardCategory.includes(category)) {
                    card.style.display = 'block';
                } else {
                    card.style.display = 'none';
                }
            });
        }
    </script>

</body>

</html>
